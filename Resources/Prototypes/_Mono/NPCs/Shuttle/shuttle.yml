# rams parent ship into the closest shuttle with a powered shuttle console
- type: htnCompound
  id: RammerShuttleCompound
  branches:
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyShuttleTargets
    - !type:HTNCompoundTask
      task: ShuttleRamCompound
    - !type:HTNCompoundTask
      task: ShuttleBackOffCompound

# same, but with leading
- type: htnCompound
  id: RammerShuttleSmartCompound
  branches:
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyShuttleTargets
    - !type:HTNCompoundTask
      task: ShuttleRamSmartCompound
    - !type:HTNCompoundTask
      task: ShuttleBackOffCompound

# same, but with leading
- type: htnCompound
  id: RammerShuttleSmartDodgingCompound
  branches:
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyShuttleTargets
    - !type:HTNCompoundTask
      task: ShuttleRamSmartDodgingCompound
    - !type:HTNCompoundTask
      task: ShuttleBackOffCompound

# ram, but no collision evasion
- type: htnCompound
  id: RammerShuttleStraightCompound
  branches:
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyShuttleTargets
    - !type:HTNCompoundTask
      task: ShuttleRamStraightCompound
    - !type:HTNCompoundTask
      task: ShuttleBackOffCompound

# approaches closest shuttle with parent ship
- type: htnCompound
  id: ApproacherShuttleCompound
  branches:
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyShuttleTargets
    - !type:HTNCompoundTask
      task: ShuttleApproachCompound

- type: htnCompound
  id: AttackerShuttleCompound
  branches:
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyShuttleTargets
    - !type:HTNCompoundTask
      task: ShuttleAttackCompound

- type: htnCompound
  id: AttackerShuttleSmartCompound
  branches:
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyShuttleTargets
    - !type:HTNCompoundTask
      task: ShuttleAttackSmartCompound

- type: htnCompound
  id: AttackerShuttleBroadsideCompound
  branches:
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyShuttleTargets
    - !type:HTNCompoundTask
      task: ShuttleAttackBroadsideCompound

- type: htnCompound
  id: ShooterShuttleCompound
  branches:
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyShuttleTargets
    - !type:HTNPrimitiveTask
      operator: !type:ShipFireGunsOperator
        shutdownState: TaskFinished
        removeKeyOnFinish: false
        leadingAccuracy: 0.4 # stupid
        targetKey: TargetCoordinates
      services:
      - !type:UtilityService
        id: TargetsService
        proto: NearbyShuttleTargets
        key: Target
        coordinatesKey: TargetCoordinates

# Short-range shooter for derelict-style hostile ships (e.g. xenoborg
# "byte" drones). When something with a ShipNpcTarget is within ~500m
# the byte opens fire; otherwise it wanders between random waypoints in
# an annulus around the world origin (smart patrol). Pairs with mounted
# (non-piloting) AI turrets.
- type: htnCompound
  id: ShooterShuttleByteCompound
  branches:
  # 1. Combat: a hostile shuttle is in range, shoot at it.
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyShuttleTargetsByte
    - !type:HTNPrimitiveTask
      operator: !type:ShipFireGunsOperator
        shutdownState: TaskFinished
        removeKeyOnFinish: false
        leadingAccuracy: 0.4 # stupid
        maxTargetingRange: 500
        targetKey: TargetCoordinates
      services:
      - !type:UtilityService
        id: TargetsService
        proto: NearbyShuttleTargetsByte
        key: Target
        coordinatesKey: TargetCoordinates
  # 2. Patrol: no targets, wander to a random waypoint in the 7-20 km
  #    annulus around (0,0). Replans on completion to pick a new point.
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:PickRandomMapWaypointOperator
        outputKey: ShipPatrolWaypoint
        minDistance: 7000
        maxDistance: 20000
    - !type:HTNPrimitiveTask
      operator: !type:ShipMoveToOperator
        targetKey: ShipPatrolWaypoint
        removeKeyOnFinish: true
        mode: GoToRange
        range: 250
        rangeTolerance: 200
        avoidCollisions: true
        avoidProjectiles: false
        leadingEnabled: false
        requireAnchored: false
        # Waypoints can be up to ~40 km away from the ship's current
        # position; keep MaxTargetingRange well above that so the
        # operator doesn't drop the waypoint mid-flight.
        maxTargetingRange: 60000

# Aggroed chase variant for "byte" drones. Two distance tiers so byte
# ships pursue past 500m up to 1000m but commit less throttle the
# further the target gets, giving the player a chance to disengage:
#  - Close tier (target inside 500m): orbit at 300m, full speed,
#    fire up to 500m.
#  - Far tier  (target 500-1000m): GoToRange ~700m with a low
#    InRangeMaxSpeed so the ship cruises in slowly and brakes early,
#    fire up to 1000m.
#  - Past 1000m: no branch matches (utility queries return no target);
#    HTN falls through to the patrol/shooter compound, and the
#    ShipAggroSystem drops aggro after the configured deaggro delay.
- type: htnCompound
  id: AttackerShuttleByteCompound
  branches:
  # Hit-and-run: ~30% chance per replan, when a target is inside the
  # close band, to break off to ~500m and keep firing while creating
  # distance. Reads as "byte makes an attack run, then peels away,
  # then comes back in" instead of static orbiting. RandomChancePrecondition
  # is evaluated only at plan time (not per-tick) so this is free at
  # runtime.
  - preconditions:
    - !type:RandomChancePrecondition
      chance: 0.3
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyShuttleTargetsByte
    - !type:HTNPrimitiveTask
      operator: !type:ShipMoveToOperator
        shutdownState: PlanFinished
        removeKeyOnFinish: false
        alwaysFaceTarget: true
        inRangeMaxSpeed: null # commit to the disengage at full burn
        range: 500
        rangeTolerance: 50
        avoidProjectiles: true
        maxTargetingRange: 1000
        targetKey: TargetCoordinates
        mode: GoToRange
    - !type:HTNPrimitiveTask
      operator: !type:ShipFireGunsOperator
        shutdownState: TaskFinished
        removeKeyOnFinish: false
        leadingAccuracy: 0.7 # medium-rank: imperfect target leading
        maxTargetingRange: 1000
        targetKey: TargetCoordinates
      services:
      - !type:UtilityService
        id: TargetsService
        proto: NearbyShuttleTargetsByte
        key: Target
        coordinatesKey: TargetCoordinates
  # Close pursuit: target inside 500m, full chase + orbit + fire.
  # Orbit at ~200m so even short-range hitscan turrets are well inside
  # their effective firing line on the player. Moderate InRangeMaxSpeed
  # (8 m/s) keeps the byte moving around the orbit ring so it isn't a
  # static target, but slow enough that its guns track instead of
  # whipping past the aim solution.
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyShuttleTargetsByte
    - !type:HTNPrimitiveTask
      operator: !type:ShipMoveToOperator
        shutdownState: PlanFinished
        removeKeyOnFinish: false
        alwaysFaceTarget: true
        inRangeMaxSpeed: 8 # cruise the orbit ring slow enough to aim
        range: 200
        rangeTolerance: 50
        avoidProjectiles: true
        maxTargetingRange: 500
        targetKey: TargetCoordinates
        mode: Orbit
    - !type:HTNPrimitiveTask
      operator: !type:ShipFireGunsOperator
        shutdownState: TaskFinished
        removeKeyOnFinish: false
        leadingAccuracy: 0.7 # medium-rank: imperfect target leading
        maxTargetingRange: 500
        targetKey: TargetCoordinates
      services:
      - !type:UtilityService
        id: TargetsService
        proto: NearbyShuttleTargetsByte
        key: Target
        coordinatesKey: TargetCoordinates
  # Far pursuit: target between 500-1000m, slower trail + long-range fire.
  # Lower InRangeMaxSpeed makes the steerer brake earlier, so the ship
  # accelerates noticeably less aggressively the further out it has to
  # chase.
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyShuttleTargetsByteFar
    - !type:HTNPrimitiveTask
      operator: !type:ShipMoveToOperator
        shutdownState: PlanFinished
        removeKeyOnFinish: false
        alwaysFaceTarget: true
        inRangeMaxSpeed: 5 # earlier brake = slower committed pursuit
        range: 700
        rangeTolerance: 100
        avoidProjectiles: true
        maxTargetingRange: 1000
        targetKey: TargetCoordinates
        mode: GoToRange
    - !type:HTNPrimitiveTask
      operator: !type:ShipFireGunsOperator
        shutdownState: TaskFinished
        removeKeyOnFinish: false
        leadingAccuracy: 0.7 # medium-rank: imperfect target leading
        maxTargetingRange: 1000
        targetKey: TargetCoordinates
      services:
      - !type:UtilityService
        id: TargetsService
        proto: NearbyShuttleTargetsByteFar
        key: Target
        coordinatesKey: TargetCoordinates

# Combined "byte" AI: patrols by default, switches to the byte chase
# compound (close fast / far slow tiers up to 1000m) if the
# ShipAggroSystem has set the "Aggroed" blackboard key. Aggro is
# triggered when a hostile crosses 500m or shoots the ship, kept
# refreshed while a target is inside 1000m, and auto-expires after
# AggroDuration of no contact past 1000m, returning the ship to patrol.
- type: htnCompound
  id: ShooterShuttleByteAggroCompound
  branches:
  # 0. Station avoidance: if the ShipAggroSystem detected we wandered
  #    inside the no-go radius around a player station, drop aggro and
  #    burn back outside before doing anything else. Once outside the
  #    border, fall straight into the normal patrol compound so the
  #    ship doesn't sit idle at the flee waypoint waiting to replan.
  - preconditions:
    - !type:KeyExistsPrecondition
      key: AvoidStationCoordinates
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:ShipMoveToOperator
        targetKey: AvoidStationCoordinates
        removeKeyOnFinish: false
        shutdownState: TaskFinished
        mode: GoToRange
        range: 200
        rangeTolerance: 100
        avoidCollisions: true
        avoidProjectiles: false
        leadingEnabled: false
        requireAnchored: false
        # Flee waypoint sits ~6 km from the station; clamp the
        # operator's drop range well above that.
        maxTargetingRange: 60000
    # After the flee maneuver completes, immediately resume patrol
    # behavior. ShipAggroSystem will have cleared the Aggroed key
    # while inside the no-go zone, so the byte returns to wandering
    # the 7-20 km annulus rather than idling at the border.
    - !type:HTNCompoundTask
      task: ShooterShuttleByteCompound
  - preconditions:
    - !type:KeyExistsPrecondition
      key: Aggroed
    tasks:
    - !type:HTNCompoundTask
      task: AttackerShuttleByteCompound
  - tasks:
    - !type:HTNCompoundTask
      task: ShooterShuttleByteCompound

# Rank-scaled byte chase variants. The "byte" drone family has three
# physical sizes (s/m/l prefix on the spawner names). Larger drones
# are tougher AND smarter; smaller drones are slower in the orbit ring
# AND lead targets less accurately, so they spray and miss more often.
# AttackerShuttleByteCompound (above) stays as the medium-rank baseline;
# these two only override inRangeMaxSpeed (cruise speed in orbit) and
# leadingAccuracy (how well guns predict target velocity). Disengage
# branch chance also scales: small bytes break off more often (timid),
# large bytes commit harder (aggressive).

# Small byte (s prefix, e.g. sgbyte): slow, sloppy aim, often disengages.
- type: htnCompound
  id: AttackerShuttleByteSmallCompound
  branches:
  - preconditions:
    - !type:RandomChancePrecondition
      chance: 0.4 # timid - peels off more often
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyShuttleTargetsByte
    - !type:HTNPrimitiveTask
      operator: !type:ShipMoveToOperator
        shutdownState: PlanFinished
        removeKeyOnFinish: false
        alwaysFaceTarget: true
        inRangeMaxSpeed: null
        range: 500
        rangeTolerance: 50
        avoidProjectiles: true
        maxTargetingRange: 1000
        targetKey: TargetCoordinates
        mode: GoToRange
    - !type:HTNPrimitiveTask
      operator: !type:ShipFireGunsOperator
        shutdownState: TaskFinished
        removeKeyOnFinish: false
        leadingAccuracy: 0.4 # bad shot
        maxTargetingRange: 1000
        targetKey: TargetCoordinates
      services:
      - !type:UtilityService
        id: TargetsService
        proto: NearbyShuttleTargetsByte
        key: Target
        coordinatesKey: TargetCoordinates
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyShuttleTargetsByte
    - !type:HTNPrimitiveTask
      operator: !type:ShipMoveToOperator
        shutdownState: PlanFinished
        removeKeyOnFinish: false
        alwaysFaceTarget: true
        inRangeMaxSpeed: 4 # noticeably slower than medium
        range: 200
        rangeTolerance: 50
        avoidProjectiles: true
        maxTargetingRange: 500
        targetKey: TargetCoordinates
        mode: Orbit
    - !type:HTNPrimitiveTask
      operator: !type:ShipFireGunsOperator
        shutdownState: TaskFinished
        removeKeyOnFinish: false
        leadingAccuracy: 0.4 # bad shot
        maxTargetingRange: 500
        targetKey: TargetCoordinates
      services:
      - !type:UtilityService
        id: TargetsService
        proto: NearbyShuttleTargetsByte
        key: Target
        coordinatesKey: TargetCoordinates
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyShuttleTargetsByteFar
    - !type:HTNPrimitiveTask
      operator: !type:ShipMoveToOperator
        shutdownState: PlanFinished
        removeKeyOnFinish: false
        alwaysFaceTarget: true
        inRangeMaxSpeed: 3
        range: 700
        rangeTolerance: 100
        avoidProjectiles: true
        maxTargetingRange: 1000
        targetKey: TargetCoordinates
        mode: GoToRange
    - !type:HTNPrimitiveTask
      operator: !type:ShipFireGunsOperator
        shutdownState: TaskFinished
        removeKeyOnFinish: false
        leadingAccuracy: 0.4
        maxTargetingRange: 1000
        targetKey: TargetCoordinates
      services:
      - !type:UtilityService
        id: TargetsService
        proto: NearbyShuttleTargetsByteFar
        key: Target
        coordinatesKey: TargetCoordinates

# Large byte (l prefix, e.g. lbyte/lgbyte): fast in orbit, accurate guns,
# rarely disengages.
- type: htnCompound
  id: AttackerShuttleByteLargeCompound
  branches:
  - preconditions:
    - !type:RandomChancePrecondition
      chance: 0.15 # aggressive - rarely peels off
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
