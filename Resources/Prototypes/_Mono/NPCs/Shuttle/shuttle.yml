        alwaysFaceTarget: true
        inRangeMaxSpeed: null
        range: 500
        rangeTolerance: 50
        avoidProjectiles: true
        maxTargetingRange: 1000
        targetKey: TargetCoordinates
        mode: GoToRange
    - !type:HTNPrimitiveTask
      operator: !type:ShipFireGunsOperator
        shutdownState: TaskFinished
        removeKeyOnFinish: false
        leadingAccuracy: 0.9 # strong lead, but can still miss
        maxTargetingRange: 1000
        targetKey: TargetCoordinates
      services:
      - !type:UtilityService
        id: TargetsService
        proto: NearbyShuttleTargetsByte
        key: Target
        coordinatesKey: TargetCoordinates
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyShuttleTargetsByte
    - !type:HTNPrimitiveTask
      operator: !type:ShipMoveToOperator
        shutdownState: PlanFinished
        removeKeyOnFinish: false
        alwaysFaceTarget: true
        inRangeMaxSpeed: 12 # faster orbit
        range: 200
        rangeTolerance: 50
        avoidProjectiles: true
        maxTargetingRange: 500
        targetKey: TargetCoordinates
        mode: Orbit
    - !type:HTNPrimitiveTask
      operator: !type:ShipFireGunsOperator
        shutdownState: TaskFinished
        removeKeyOnFinish: false
        leadingAccuracy: 0.9 # strong lead, but can still miss
        maxTargetingRange: 500
        targetKey: TargetCoordinates
      services:
      - !type:UtilityService
        id: TargetsService
        proto: NearbyShuttleTargetsByte
        key: Target
        coordinatesKey: TargetCoordinates
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:UtilityOperator
        proto: NearbyShuttleTargetsByteFar
    - !type:HTNPrimitiveTask
      operator: !type:ShipMoveToOperator
        shutdownState: PlanFinished
        removeKeyOnFinish: false
        alwaysFaceTarget: true
        inRangeMaxSpeed: 8
        range: 700
        rangeTolerance: 100
        avoidProjectiles: true
        maxTargetingRange: 1000
        targetKey: TargetCoordinates
        mode: GoToRange
    - !type:HTNPrimitiveTask
      operator: !type:ShipFireGunsOperator
        shutdownState: TaskFinished
        removeKeyOnFinish: false
        leadingAccuracy: 0.9 # strong lead, but can still miss
        maxTargetingRange: 1000
        targetKey: TargetCoordinates
      services:
      - !type:UtilityService
        id: TargetsService
        proto: NearbyShuttleTargetsByteFar
        key: Target
        coordinatesKey: TargetCoordinates

# Aggro wrappers for the rank-scaled variants.
- type: htnCompound
  id: ShooterShuttleByteSmallAggroCompound
  branches:
  - preconditions:
    - !type:KeyExistsPrecondition
      key: Aggroed
    tasks:
    - !type:HTNCompoundTask
      task: AttackerShuttleByteSmallCompound
  - tasks:
    - !type:HTNCompoundTask
      task: ShooterShuttleByteCompound

- type: htnCompound
  id: ShooterShuttleByteLargeAggroCompound
  branches:
  - preconditions:
    - !type:KeyExistsPrecondition
      key: Aggroed
    tasks:
    - !type:HTNCompoundTask
      task: AttackerShuttleByteLargeCompound
  - tasks:
    - !type:HTNCompoundTask
      task: ShooterShuttleByteCompound

- type: utilityQuery
  id: NearbyShuttleTargetsByte
  query:
  - !type:NearbyHostileShuttlesQuery
    range: 500
    blacklist:
      tags:
      - ShuttleAIIgnore
  considerations:
  - !type:TargetInverseDistanceCon
    curve: !type:QuadraticCurve
      slope: 1
      exponent: 1
      yOffset: 0
      xOffset: 0

# Wider variant of NearbyShuttleTargetsByte used by the far-tier byte
# chase branch. Mirrors NearbyShuttleTargetsByte but extends out to the
# aggro leash distance so the byte can keep tracking targets that
# escape past 500m without re-entering passive shooter mode.
- type: utilityQuery
  id: NearbyShuttleTargetsByteFar
  query:
  - !type:NearbyHostileShuttlesQuery
    range: 1000
    blacklist:
      tags:
      - ShuttleAIIgnore
  considerations:
  - !type:TargetInverseDistanceCon
    curve: !type:QuadraticCurve
      slope: 1
      exponent: 1
      yOffset: 0
      xOffset: 0

- type: utilityQuery
  id: NearbyShuttleTargets
  query:
  - !type:NearbyHostileShuttlesQuery
    blacklist:
      tags:
      - ShuttleAIIgnore
  considerations:
  - !type:TargetInverseDistanceCon
    curve: !type:QuadraticCurve
      slope: 1
      exponent: 1
      yOffset: 0
      xOffset: 0

- type: htnCompound
  id: ShuttleRamCompound
  branches:
  - preconditions:
    - !type:KeyExistsPrecondition
      key: Target
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:ShipMoveToOperator
        shutdownState: TaskFinished
        removeKeyOnFinish: false
        inRangeMaxSpeed: null # there's no braking where we're going
        leadingEnabled: false # else it's too good
        targetKey: TargetCoordinates
      services:
      - !type:UtilityService
        id: TargetsService
        proto: NearbyShuttleTargets
        key: Target
        coordinatesKey: TargetCoordinates

- type: htnCompound
  id: ShuttleRamSmartCompound
  branches:
  - preconditions:
    - !type:KeyExistsPrecondition
      key: Target
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:ShipMoveToOperator
        shutdownState: TaskFinished
        removeKeyOnFinish: false
        inRangeMaxSpeed: null # there's no braking where we're going
        targetKey: TargetCoordinates
      services:
      - !type:UtilityService
        id: TargetsService
        proto: NearbyShuttleTargets
        key: Target
        coordinatesKey: TargetCoordinates

- type: htnCompound
  id: ShuttleRamSmartDodgingCompound
  branches:
  - preconditions:
    - !type:KeyExistsPrecondition
      key: Target
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:ShipMoveToOperator
        shutdownState: TaskFinished
        removeKeyOnFinish: false
        inRangeMaxSpeed: null # there's no braking where we're going
        targetKey: TargetCoordinates
        avoidProjectiles: true
      services:
      - !type:UtilityService
        id: TargetsService
        proto: NearbyShuttleTargets
        key: Target
        coordinatesKey: TargetCoordinates

- type: htnCompound
  id: ShuttleRamStraightCompound
  branches:
  - preconditions:
    - !type:KeyExistsPrecondition
      key: Target
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:ShipMoveToOperator
        shutdownState: TaskFinished
        removeKeyOnFinish: false
        inRangeMaxSpeed: null # there's no braking where we're going
        targetKey: TargetCoordinates
        avoidCollisions: false
        leadingEnabled: false
      services:
      - !type:UtilityService
        id: TargetsService
        proto: NearbyShuttleTargets
        key: Target
        coordinatesKey: TargetCoordinates

- type: htnCompound
  id: ShuttleBackOffCompound
  branches:
  - preconditions:
    - !type:KeyExistsPrecondition
      key: Target
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:ShipMoveToOperator
        shutdownState: TaskFinished
        removeKeyOnFinish: false
        finishOnCollide: false # we might be already collided
        inRangeMaxSpeed: null # just immediately finish once out of range
        leadingEnabled: false
        # be within 200-300m
        range: 300
        rangeTolerance: 100
        targetKey: TargetCoordinates

- type: htnCompound
  id: ShuttleApproachCompound
  branches:
  - preconditions:
    - !type:KeyExistsPrecondition
      key: TargetCoordinates
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:ShipMoveToOperator
        shutdownState: TaskFinished
        removeKeyOnFinish: false
        inRangeMaxSpeed: 0.1
        range: 250
        rangeTolerance: 50
        alwaysFaceTarget: true
        targetKey: TargetCoordinates
      services:
      - !type:UtilityService
        id: TargetsService
        proto: NearbyShuttleTargets
        key: Target
        coordinatesKey: TargetCoordinates

- type: htnCompound
  id: ShuttleAttackCompound
  branches:
  - preconditions:
    - !type:KeyExistsPrecondition
      key: TargetCoordinates
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:ShipMoveToOperator
        shutdownState: PlanFinished
        removeKeyOnFinish: false
        alwaysFaceTarget: true
        inRangeMaxSpeed: null # orbit at top velocity
        range: 850
        rangeTolerance: 150
        targetKey: TargetCoordinates
        mode: Orbit
    - !type:HTNPrimitiveTask
      operator: !type:ShipFireGunsOperator
        shutdownState: TaskFinished
        removeKeyOnFinish: false
        leadingAccuracy: 0.4 # stupid
        targetKey: TargetCoordinates
      services:
      - !type:UtilityService
        id: TargetsService
        proto: NearbyShuttleTargets
        key: Target
        coordinatesKey: TargetCoordinates

# hardest possible attacker AI
- type: htnCompound
  id: ShuttleAttackSmartCompound
  branches:
  - preconditions:
    - !type:KeyExistsPrecondition
      key: TargetCoordinates
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:ShipMoveToOperator
        shutdownState: PlanFinished
        removeKeyOnFinish: false
        alwaysFaceTarget: true
        inRangeMaxSpeed: null # orbit at top velocity
        range: 850
        rangeTolerance: 150
        avoidProjectiles: true
        targetKey: TargetCoordinates
        mode: Orbit
    - !type:HTNPrimitiveTask
      operator: !type:ShipFireGunsOperator
        shutdownState: TaskFinished
        removeKeyOnFinish: false
        leadingAccuracy: 1
        targetKey: TargetCoordinates
      services:
      - !type:UtilityService
        id: TargetsService
        proto: NearbyShuttleTargets
        key: Target
        coordinatesKey: TargetCoordinates

- type: htnCompound
  id: ShuttleAttackBroadsideCompound
  branches:
  - preconditions:
    - !type:KeyExistsPrecondition
      key: TargetCoordinates
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:ShipMoveToOperator
        shutdownState: PlanFinished
        removeKeyOnFinish: false
        alwaysFaceTarget: true
        inRangeMaxSpeed: null # orbit at top velocity
        range: 450
        rangeTolerance: 50
        targetKey: TargetCoordinates
        mode: OrbitCW
        targetRotation: 90
