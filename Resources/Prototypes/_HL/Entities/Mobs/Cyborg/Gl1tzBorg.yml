- type: entity
  id: BorgChassisGl1tz
  parent: [BorgChassisQuad, ShowSecurityIcons]
  components:
  - type: Sprite
    sprite: _HL/Mobs/Player/borgs/quads.rsi
    scale: 0.7, 0.7
    layers:
    - state: glitz
      map: ["movement"]
    - state: glitzl
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
    - state: glitzr
      shader: unshaded
      map: ["light"]
      visible: false
  - type: SpriteMovement
    movementLayers:
      movement:
        state: glitzmoving
    noMovementLayers:
      movement:
        state: glitz
  # HardLight start: Added encryption key slots in addition to intrinsic radio channels.
  - type: EncryptionKeyHolder
    keySlots: 10
    preserveExistingChannels: true
    intrinsicChannels:
    - Binary
    - ColSec
    - Security
    - Science
    - Common
  - type: IntrinsicRadioTransmitter
    intrinsicChannels:
    - Binary
    - ColSec
    - Security
    - Science
    - Common
  - type: ActiveRadio
    intrinsicChannels:
    - Binary
    - ColSec
    - Security
    - Science
    - Common
  # HardLight end
  - type: BorgChassis
    maxModules: 5
    moduleWhitelist:
      tags:
      - BorgModuleGeneric
      - XenoborgModuleGeneric
      - BorgModuleSecurity
      - BorgModuleSyndicate
      - BorgModuleSyndicateAssault
    hasMindState: glitzl
    noMindState: glitzr
  - type: AccessReader
    access: [["Security"], ["Command"]]
  - type: SiliconLawProvider
    laws: Qborg
  - type: FlashImmunity
  - type: SpriteStateToggle
    spriteLayer: movement
    stateOff: glitz
    stateOn: glitzballz
    movementStateOff: glitzmoving
    movementStateOn: glitzmovingballz
