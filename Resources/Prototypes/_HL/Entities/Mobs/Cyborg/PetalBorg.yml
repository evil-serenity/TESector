- type: entity
  id: BorgChassisPetal
  parent: [BorgChassisQuad, ShowMedicalIcons]
  components:
  - type: Sprite
    sprite: _HL/Mobs/Player/borgs/quads.rsi
    scale: 0.7, 0.7
    layers:
    - state: petalborg
      map: ["movement"]
    - state: petalborgl
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
    - state: petalborgr
      shader: unshaded
      map: ["light"]
      visible: false
  - type: SpriteMovement
    movementLayers:
      movement:
        state: petalborg_moving
    noMovementLayers:
      movement:
        state: petalborg
  # HardLight start: Added encryption key slots in addition to intrinsic radio channels.
  - type: EncryptionKeyHolder
    keySlots: 10
    preserveExistingChannels: true
    intrinsicChannels:
    - Binary
    - Medical
    - Science
    - Common
  - type: IntrinsicRadioTransmitter
    intrinsicChannels:
    - Binary
    - Medical
    - Science
    - Common
  - type: ActiveRadio
    intrinsicChannels:
    - Binary
    - Medical
    - Science
    - Common
  - type: SurgerySpeedModifier #shitmed
    speedModifier: 1.75
  # HardLight end
  - type: BorgChassis
    maxModules: 7
    moduleWhitelist:
      tags:
      - BorgModuleGeneric
      - BorgModuleMedical
      - BorgModuleSyndicate
      - BorgModuleSyndicateAssault
      - XenoborgModuleGeneric
    hasMindState: petalborgl
    noMindState: petalborgr
  - type: AccessReader
    access: [["Command"], ["Research"]]
  - type: SiliconLawProvider
    laws: Medical
  - type: SolutionScanner
  - type: FabricateActions
    actions:
    - ActionFabricateLollipop
    - ActionFabricateGumball
  - type: SpriteStateToggle
    spriteLayer: movement
    stateOff: petalborg
    stateOn: petalborgballz
    movementStateOff: petalborg_moving
    movementStateOn: petalborg_movingballz
