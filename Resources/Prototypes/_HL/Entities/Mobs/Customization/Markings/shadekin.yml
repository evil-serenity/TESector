# Shadekin eyes
- type: marking
  id: ShadekinEyeR
  bodyPart: Eyes
  markingCategory: Head
  speciesRestriction: [Skrell, Avali, Dwarf, Human, SlimePerson, Oni, Harpy, Reptilian, Vulpkanin, Rodentia, Goblin, Sheleg, Feroxi, Moth, Kitsune, Chitinid, Shadekin, Felinid, Tajaran]
  coloring:
    default:
      type:
        !type:EyeColoring
  sprites:
  - sprite: _HL/Mobs/Customization/Shadekin/shadekineyes.rsi
    state: shadekineye_r

- type: marking
  id: ShadekinEyeL
  bodyPart: Eyes
  markingCategory: Head
  speciesRestriction: [Skrell, Avali, Dwarf, Human, SlimePerson, Oni, Harpy, Reptilian, Vulpkanin, Rodentia, Goblin, Sheleg, Feroxi, Moth, Kitsune, Chitinid, Shadekin, Felinid, Tajaran]
