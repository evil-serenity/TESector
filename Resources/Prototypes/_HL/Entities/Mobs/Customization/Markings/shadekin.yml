# This file over-rides default common markings from head top and tail into head side and overlay
# Because head top and tail counts are strictly 1 and can't be altered on shadekin

# Chtinid antennas
- type: marking
  id: ShadekinChitinidAntennasCurly
  bodyPart: HeadTop
  markingCategory: HeadSide
  speciesRestriction: [Shadekin]
  sprites:
  - sprite: DeltaV/Mobs/Customization/Chitinid/chitinid_antennas.rsi
    state: curly

