- type: entity
  name: DreadTalon
  id: dreadtalonbase
  parent: MobSpaceBasic
  description: It looks friendly. Why don't you give it a hug?
#  categories: [ HideSpawnMenu ] # Frontier
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _HL/Mobs/Aliens/dreadtalon.rsi
    scale: 0.7, 0.7
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: dreadtalon
    - map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
      state: dreadtalonglow
      shader: unshaded
  - type: CombatMode
    canDisarm: false
  - type: InputMover
  - type: MobMover
  - type: GhostTakeoverAvailable
  - type: TypingIndicator
    proto: alien
  - type: Tag
    tags:
      - CannotSuicide
      - DoorBumpOpener
      - FootstepSound
  - type: NoSlip
  - type: DamageStateVisuals
    states:
      Alive:
        Base: dreadtalon
        BaseUnshaded: dreadtalonglow
      Critical:
        Base: crit
      Dead:
        Base: dead
  - type: ReplacementAccent
    accent: genericAggressive
  - type: Vocal
    sounds:
      Unsexed: Bear
  - type: InteractionPopup
    successChance: 0.25
    interactSuccessString: petting-success-bear
    interactFailureString: petting-failure-bear
    interactSuccessSound:
      path: /Audio/Animals/sloth_squeak.ogg
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.25
        density: 1000
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: PlateletFactories
    intervalSeconds: 1
    healPerSecond: .5
    critMultiplier: .25
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Dreadtalon
  - type: Tool
    speedModifier: 1.5
    qualities:
      - Prying
  - type: Prying
    pryPowered: true
    force: true
    useSound:
      path: /Audio/Items/crowbar.ogg
  - type: Reactive
    groups:
      Flammable: [Touch]
      Extinguish: [Touch]
  - type: MobState
  - type: Deathgasp
  - type: MobStateActions
    actions:
      Critical:
      - ActionCritSuccumb
      - ActionCritFakeDeath
      - ActionCritLastWords
  - type: BankAccount
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 5
  - type: Physics
    bodyType: KinematicController
  - type: MobThresholds
    thresholds:
      0: Alive
      200: Critical
      320: Dead
  - type: SlowOnDamage
    speedModifierThresholds:
      150: 0.5
  - type: Stamina
    critThreshold: 200
  - type: Bloodstream
    bloodReagent: UnstableMutagen
    bloodMaxVolume: 650
  - type: LayingDown
  - type: Hands
  - type: Body
    prototype: Friendshaped
  - type: ThermalVision # Starlight
  - type: Access
  - type: Puller
    needsHands: false
  - type: MeleeWeapon
    damage:
      types:
        Slash: 33
        Radiation: 10
  - type: CumProducer
    maxVol: 250
    reVol: 50
    reHunger: 1
  - type: JumpAbility
    action: ActionVulpkaninGravityJump
    canCollide: true
    jumpDistance: 6
    jumpSound:
      path: /Audio/Weapons/punchmiss.ogg
      params:
        pitch: 1.33
        volume: -5
        variation: 0.05
        
- type: entity
  name: DreadTalon
  id: BananaTalon
  parent: dreadtalonbase
  description: It looks friendly. Why don't you give it a hug?
#  categories: [ HideSpawnMenu ] # Frontier
  components:
  - type: Sprite
    drawdepth: Mobs
    sprite: _HL/Mobs/Aliens/dreadtalon.rsi
    scale: 0.7, 0.7
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: bananatalon
    - map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
      state: bananatalonglow
      shader: unshaded
  - type: DamageStateVisuals
    states:
      Alive:
        Base: bananatalon
        BaseUnshaded: bananatalonglow
      Critical:
        Base: crit
      Dead:
        Base: dead