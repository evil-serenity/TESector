#plastitanium secret door
- type: entity
  id: PlastitaniumSecretDoorAssembly
  name: secret plastitanium door assembly
  parent: BaseSecretDoorAssembly
  components:
  - type: Sprite
    sprite: _HL/Structures/Doors/secret_door_plastitanium.rsi
    state: assembly
  - type: Construction
    graph: PlastitaniumSecretDoorGraph
    node: assembly
  placement:
    mode: SnapgridCenter

- type: entity
  id: PlastitaniumSecretDoor
  name: plastitanium wall
  parent: BaseSecretDoor
  components:
  - type: Sprite
    sprite: _HL/Structures/Doors/secret_door_plastitanium.rsi
  - type: Construction
    graph: PlastitaniumSecretDoorGraph
    node: PlastitaniumSecretDoorNode
    containers:
    - battery-container
