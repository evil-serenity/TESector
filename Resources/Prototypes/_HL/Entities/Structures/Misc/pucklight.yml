- type: entity
  name: puck light
  description: "An always powered in-ground light."
  id: PuckLight
  suffix: AlwaysPowered
  parent: BaseStructure
  components:
  - type: SubFloorHide
    visibleLayers:
      - enum.SubfloorLayers.FirstLayer
      - enum.SubfloorLayers.SecondLayer
  - type: Sprite
    sprite: _HL/Structures/pucklight.rsi
    snapCardinals: true
    drawdepth: FloorObjects
    noRot: true
    layers:
    - map: ["enum.PoweredLightLayers.Base", "enum.SubfloorLayers.SecondLayer"]
      state: base
    - map: ["enum.PoweredLightLayers.Glow", "enum.SubfloorLayers.FirstLayer"]
      state: glow
      shdaer: unshaded
    state: base
  - type: PointLight
    radius: 10
    energy: 0.8
    softness: 1
    color: "#FFE4CE"
  - type: Anchorable
  - type: Damageable
    damageContainer: Inorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 1
      - !type:EmptyAllContainersBehaviour
      - !type:PlaySoundBehavior
        sound:
          collection: MetalGlassBreak
  - type: StaticPrice
    price: 5
  # Add mono ship repair
  - type: ShipRepairable
    repairTime: 1
    repairCost: 1

- type: entity
  id: PoweredPuckLightEmpty
  name: puck light
  description: "A small in-ground light."
  suffix: Empty
  parent: PuckLight
  components:
  - type: Sprite
    sprite: _HL/Structures/pucklight.rsi
    state: empty
  - type: PointLight
    enabled: false
  - type: PoweredLight
    bulb: Bulb
  - type: ContainerContainer
    containers:
      light_bulb: !type:ContainerSlot
  - type: ApcPowerReceiver
  - type: ExtensionCableReceiver
  - type: DeviceNetwork
    deviceNetId: Wireless
    receiveFrequencyId: SmartLight
  - type: WirelessNetworkConnection
    range: 200
  - type: DeviceLinkSink
    ports:
      - On
      - Off
      - Toggle
  - type: Construction
    graph: LightFixture
    node: puckLight
  - type: Appearance
  - type: PoweredLightVisuals
    blinkingSound:
      path: "/Audio/Machines/light_tube_on.ogg"
    spriteStateMap:
      empty: empty
      off: base
      on: base
      broken: broken
      burned: burned
  - type: DamageOnInteract
    damage:
      types:
        Heat: 1
    popupText: powered-light-component-burn-hand

- type: entity
  id: PoweredPuckLight
  name: puck light
  description: "An in-ground light fixture. Draws power and produces light when equipped with a light bulb."
  suffix: ""
  parent: PoweredPuckLightEmpty
  components:
  - type: Sprite
    state: base
  - type: PointLight
    enabled: true
  - type: ContainerFill
    containers:
      light_bulb: [ LightBulb ]
  - type: AmbientOnPowered
  - type: AmbientSound
    volume: -25
    range: 1
    sound:
      path: /Audio/Ambience/Objects/light_hum.ogg
  - type: DamageOnInteract
    damage:
      types:
        Heat: 2
    popupText: powered-light-component-burn-hand
  - type: RCDDeconstructable
    cost: 1
    delay: 2

