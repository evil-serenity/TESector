# Faction Uniforms
# Inherit from Syndicate formal suit (ClothingUniformJumpsuitSyndieFormal)

# Syndicate High Command Suit
- type: entity
  parent: [ClothingUniformJumpsuitSyndieFormal, ContrabandClothing]
  id: ClothingUniformJumpsuitSyndicateHighCommand
  name: syndicate high command suit
  description: An elegant formal suit reserved for high-ranking Syndicate commanders. Features premium materials and distinguished styling.
  components:
  - type: Sprite
    sprite: _HL/Clothing/Uniforms/highcommsuit.rsi
  - type: Clothing
    sprite: _HL/Clothing/Uniforms/highcommsuit.rsi
  - type: Tag
    tags:
    - ClothMade

