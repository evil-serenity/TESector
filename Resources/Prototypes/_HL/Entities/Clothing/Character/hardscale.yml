    sprite: Objects/Devices/pda.rsi
  - type: Pda
    id: CentcomIDCardDeathsquad
  - type: Appearance
    appearanceDataInit:
     enum.PdaVisuals.PdaType:
       !type:String
       pda-hardscale
  - type: PdaBorderColor
    borderColor: "#A32D26"
  - type: Icon
    sprite: Objects/Devices/pda.rsi
    state: pda-hardscale
  - type: Tag #  Ignore Chameleon tags
    tags:
    - Admin
    - DoorBumpOpener

