- type: entity
  parent: ClothingBackpackDeathSquad
  id: ClothingBackpackHardscale
  name: DS backpack
  description: Holds the kit of Hardscale, the hell happened to it? 
  components:
  - type: Sprite
    sprite: Clothing/Back/Backpacks/hardscale.rsi
  - type: Storage
    grid:
    - 0,0,7,6

- type: entity
  parent: ClothingMaskGasDeathSquad
  id: ClothingMaskGasHardscale
  name: DS gas mask
  description: A unique gas mask for Hardscale, what the hell happened to it? 
  components:
  - type: Sprite
    sprite: Clothing/Mask/hardscale.rsi
  - type: Clothing
    sprite: Clothing/Mask/hardscale.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.80
        Slash: 0.80
        Piercing: 0.90
        Heat: 0.90

- type: entity
