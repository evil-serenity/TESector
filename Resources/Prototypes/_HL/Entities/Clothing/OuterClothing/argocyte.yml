- type: entity
  parent: [ClothingOuterBaseLarge, AllowSuitStorageClothing]
  id: ClothingOuterArmorArgocyteHeavy
  name: heavy argocyte armor
  description: An extremely heavy piece of armor that protects against excessive damage.
  components:
  - type: Sprite
    sprite: _HL/Clothing/OuterClothing/argocyteheavy.rsi
  - type: Clothing
    sprite: _HL/Clothing/OuterClothing/argocyteheavy.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.45
        Slash: 0.4
        Piercing: 0.45
        Heat: 0.45
        Caustic: 0.65
  - type: GroupExamine
  - type: ProtectedFromStepTriggers
    slots: WITHOUT_POCKET
  - type: ExplosionResistance
    damageCoefficient: 0.45
  - type: ClothingSpeedModifier
    walkModifier: 0.65
    sprintModifier: 0.65
  - type: Damageable
    damageContainer: Shield
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 200
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
      - trigger:
          !type:DamageTrigger
          damage: 160
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
          - !type:PlaySoundBehavior
            sound:
              collection: MetalBreak
          - !type:SpawnEntitiesBehavior
            spawn:
              MaterialArgocytePlateHeavy:
                min: 10
                max: 15
  - type: Construction
    graph: ArgoArmorHardGraph
    node: finish
   
- type: entity
  parent: [ClothingOuterBaseLarge, AllowSuitStorageClothing]
  id: ClothingOuterArmorArgocyteLight
  name: light argocyte armor
  description: An almost weightless piece of armor that protects against excessive damage. Extremely vulnerable to explosions.
  components:
  - type: Sprite
    sprite: _HL/Clothing/OuterClothing/argocytelight.rsi
  - type: Clothing
    sprite: _HL/Clothing/OuterClothing/argocytelight.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Piercing: 0.8
        Heat: 0.8
        Caustic: 0.8
  - type: GroupExamine
  - type: ProtectedFromStepTriggers
    slots: WITHOUT_POCKET
  - type: ExplosionResistance
    damageCoefficient: 1.4
  - type: ClothingSpeedModifier
    walkModifier: 1.25
    sprintModifier: 1.25
  - type: Damageable
    damageContainer: Shield
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 100
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
      - trigger:
          !type:DamageTrigger
          damage: 80
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
          - !type:PlaySoundBehavior
            sound:
              collection: MetalBreak
          - !type:SpawnEntitiesBehavior
            spawn:
              MaterialArgocytePlateLight:
                min: 10
                max: 15
  - type: Construction
    graph: ArgoArmorLightGraph
    node: finish
