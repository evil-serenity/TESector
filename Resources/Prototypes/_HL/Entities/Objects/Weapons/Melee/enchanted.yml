#Ice swords

- type: entity
  name: Sabre of ice
  parent: [ BaseC3WizardContraband, CaptainSabre ]
  id: IceSabre
  description: A ceremonial weapon, recently used for wizard experiments. This one feels freezing-cold to the touch.
  components:
  - type: PointLight
    radius: 2
    energy: 2
    color: cyan
  - type: Sprite
    sprite: _HL/Objects/Weapons/Melee/Enchanted/icesabre.rsi
  - type: SolutionContainerManager
    solutions:
      melee:
        maxVol: 50
        reagents:
        - ReagentId: Fresium
          Quantity: 50
  - type: SolutionRegeneration
    solution: melee
    generated:
      reagents:
      - ReagentId: Fresium
        Quantity: 1
  - type: MeleeChemicalInjector
    transferAmount: 7
    solution: melee
    pierceArmor: true
  - type: MeleeWeapon
    attackRate: 1.5
    damage:
