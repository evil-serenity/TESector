#Fire swords

- type: entity
  name: Sabre of fire
  parent: [ BaseC3WizardContraband, CaptainSabre ]
  id: FireSabre
  description: A ceremonial weapon A ceremonial weapon, recently used for wizard experiments. This one feels too hot to touch.
  components:
  - type: IgnitionSource
    temperature: 300
  - type: PointLight
    radius: 3
    energy: 2
    color: orange
  - type: Sprite
    sprite: _HL/Objects/Weapons/Melee/Enchanted/firesabre.rsi
  - type: IgniteOnMeleeHit
    fireStacks: 0.2
  - type: MeleeWeapon
    attackRate: 1.5
    damage:
      types:
        Slash: 10
        Heat: 8
    soundHit:
        path: /Audio/_HL/Weapons/Melee/bladefireball.ogg
  - type: Reflect
    reflectProb: .1
    spread: 90
  - type: Item
    sprite: _HL/Objects/Weapons/Melee/Enchanted/firesabre.rsi

- type: entity
  name: Katana of fire
  parent: [ BaseC3WizardContraband, Katana ]
  id: FireKatana
  description: Ancient craftwork made with not so ancient plasteel. This one feels too hot to touch.
  components:
  - type: IgnitionSource
    temperature: 300
  - type: PointLight
    radius: 3
    energy: 2
    color: orange
  - type: IgniteOnMeleeHit
    fireStacks: 0.3
  - type: Sprite
    sprite: _HL/Objects/Weapons/Melee/Enchanted/firekatana.rsi
  - type: MeleeWeapon
    damage:
      types:
        Slash: 10
        Heat: 8
    soundHit:
        path: /Audio/_HL/Weapons/Melee/bladefireball.ogg
  - type: Item
    sprite: _HL/Objects/Weapons/Melee/Enchanted/firekatana.rsi
    
- type: entity
  name: Claymore of fire
  parent: [ BaseC3WizardContraband, Claymore ]
  id: FireClaymore
  description: An ancient war blade and magic. This one feels too hot to touch.
  components:
  - type: IgnitionSource
    temperature: 300
  - type: PointLight
    radius: 4
    energy: 2
    color: orange
  - type: IgniteOnMeleeHit
    fireStacks: 0.4
  - type: Sprite
    sprite: _HL/Objects/Weapons/Melee/Enchanted/fireclaymore.rsi
  - type: MeleeWeapon
    attackRate: 0.75
    damage:
      types:
        Slash: 13
        Heat: 11
    soundHit:
        path: /Audio/_HL/Weapons/Melee/bladefireball.ogg
  - type: Item
    sprite: _HL/Objects/Weapons/Melee/Enchanted/fireclaymore.rsi

- type: entity
  name: Cutlass of Fire
