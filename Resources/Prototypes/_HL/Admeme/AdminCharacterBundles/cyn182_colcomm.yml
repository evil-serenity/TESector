      volume: 5
      moles:
        - 0 # oxygen
        - 1203 # nitrogen
      temperature: 1

# smaller nullspace
- type: entity
  id: ClothingNullSpaceTeleporterSmall
  parent: ClothingNullSpaceTeleporter
  name: Portable nullspace teleporter
  description: A new experemental design divised for more portable use to quickly get between stations and colonial command for said personel. A label says 'Use with caution, and stow when not in use.'
  suffix: CYN182, Admin
  components:
    - type: Item
      size: Large

# colcomm engi hardsuit
- type: entity
  id: ClothingOuterHardsuitERTCentcommEngi
  parent: ClothingOuterHardsuitERTCentcomm
  name: ColComm engineering hardsuit
  description: A colonial command hardsuit situated for engineering duties. Boasting a robust internally-lined weave to protect the wearer from a veriety of threats common in the field while being easier to stow. At the cost of some speed and low combat effectiveness.
  suffix: CYN182, Admin
  components:
   - type: PressureProtection
     highPressureMultiplier: 0.02
     lowPressureMultiplier: 1000
   - type: TemperatureProtection
     heatingCoefficient: 0.001
     coolingCoefficient: 0.001
   - type: Item
     size: Huge
   - type: ExplosionResistance
     damageCoefficient: 0.5
   - type: Armor
     modifiers:
       coefficients:
         Blunt: 0.85
         Slash: 0.85
         Piercing: 0.75
         Heat: 0.1
         Cold: 0.1
         Shock: 0.1
         Radiation: 0.1
         Caustic: 0.1
   - type: ZombificationResistance
     zombificationResistanceCoefficient: 0.25
   - type: FireProtection
     reduction: 0.5
   - type: ClothingSpeedModifier
     walkModifier: 0.9
     sprintModifier: 0.9