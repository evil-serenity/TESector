# ID card
- type: entity
  id: CYN182ColcommIDCard
  parent: IDCardStandard
  name: CYN-182's ID card (Colonial Engineer)
  description: '"Do your jobs, be competent, and all will turn out just fine."'
  suffix: CYN182, Admin
  components:
  - type: Tag
    tags:
    - Admin
  - type: IdCard
    fullName: CYN-182
    jobTitle: job-title-colonial-engineer
    jobIcon: JobIconColComm
  - type: Sprite
    layers:
    - state: centcom
    - state: idcentcom
  - type: Item
    heldPrefix: blue
  - type: Access
    groups:
    - AllAccess
    tags:
    - CentralCommand

