# HTN system for turrets targeting grids with ShuttleDeedComponent

# Utility query for finding nearby grids with ShuttleDeed
- type: utilityQuery
  id: NearbyShuttleDeedGridTargets
  query:
  - !type:NearbyShuttleDeedGridsQuery
    range: 500
    blacklist:
      tags:
      - ShuttleAIIgnore
  considerations:
  - !type:TargetInverseDistanceCon
    curve: !type:QuadraticCurve
      slope: 1
      exponent: 1
      yOffset: 0
      xOffset: 0

# Main compound for turrets that target ShuttleDeed grids and mechs/vehicles
- type: htnCompound
  id: ShuttleDeedTurretCompound
  branches:
    - tasks:
        - !type:HTNPrimitiveTask
          operator: !type:UtilityOperator
            proto: NearbyGunTargets
        
        - !type:HTNPrimitiveTask
          preconditions:
            - !type:KeyExistsPrecondition
              key: Target
            - !type:TargetInRangePrecondition
              targetKey: Target
              # TODO: Non-scuffed
              rangeKey: RangedRange
            - !type:TargetInLOSPrecondition
              targetKey: Target
              rangeKey: RangedRange
          operator: !type:GunOperator
            targetKey: Target
            requireLOS: true
          services:
            - !type:UtilityService
              id: RangedService
              proto: NearbyGunTargets
              key: Target
    - tasks:
      - !type:HTNPrimitiveTask
        operator: !type:UtilityOperator
          proto: NearbyShuttleDeedGridTargets
      - !type:HTNCompoundTask
        task: ShuttleDeedTurretAttackCompound
    # Fallback: return to forward-facing position when no targets
    - tasks:
      - !type:HTNCompoundTask
        task: TurretReturnForward

# Return turret to forward-facing position
- type: htnCompound
  id: TurretReturnForward
  branches:
  - tasks:
    - !type:HTNPrimitiveTask
      operator: !type:SetForwardRotationOperator
        targetKey: RotateTarget
    - !type:HTNPrimitiveTask
      operator: !type:RotateToTargetOperator
        targetKey: RotateTarget

# Mounted turret HTN: rotate + fire only, no ship steering.
# Use this for AI turrets bolted onto a parent ship that already has its
# own ship-AI core. Otherwise every turret becomes a pilot of the grid
# and fights the core for steering authority (the byte-class drone bug).
- type: htnCompound
  id: MountedTurretCompound
  branches:
    - tasks:
        - !type:HTNPrimitiveTask
          operator: !type:UtilityOperator
            proto: NearbyGunTargets

        - !type:HTNPrimitiveTask
          preconditions:
            - !type:KeyExistsPrecondition
              key: Target
            - !type:TargetInRangePrecondition
              targetKey: Target
              rangeKey: RangedRange
            - !type:TargetInLOSPrecondition
              targetKey: Target
              rangeKey: RangedRange
          operator: !type:GunOperator
            targetKey: Target
            requireLOS: true
          services:
            - !type:UtilityService
              id: RangedService
              proto: NearbyGunTargets
              key: Target
    - tasks:
      - !type:HTNPrimitiveTask
        operator: !type:UtilityOperator
          proto: NearbyShuttleDeedGridTargets
      - !type:HTNCompoundTask
        task: MountedTurretAttackCompound
    - tasks:
      - !type:HTNCompoundTask
        task: TurretReturnForward

# Attack compound for mounted turrets: rotate to face + fire, no ShipMoveTo.
- type: htnCompound
  id: MountedTurretAttackCompound
  branches:
  - preconditions:
    - !type:KeyExistsPrecondition
      key: TargetCoordinates
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:ShipFireGunsOperator
        shutdownState: TaskFinished
        removeKeyOnFinish: false
        leadingAccuracy: 0.6
        requireAnchored: false
        maxTargetingRange: 500
        targetKey: TargetCoordinates
      services:
      - !type:UtilityService
        id: TargetsService
        proto: NearbyShuttleDeedGridTargets
        key: Target
        coordinatesKey: TargetCoordinates

# Attack compound - move toward target and fire at it
- type: htnCompound
  id: ShuttleDeedTurretAttackCompound
  branches:
  - preconditions:
    - !type:KeyExistsPrecondition
      key: TargetCoordinates
    tasks:
    - !type:HTNPrimitiveTask
      operator: !type:ShipMoveToOperator
        shutdownState: PlanFinished
        removeKeyOnFinish: false
        targetKey: TargetCoordinates
        range: 50
        rangeTolerance: 25
        maxTargetingRange: 500
        requireAnchored: false
        avoidCollisions: true
        finishOnCollide: false
        leadingEnabled: true
      services:
      - !type:UtilityService
        id: TargetsService
        proto: NearbyShuttleDeedGridTargets
        key: Target
        coordinatesKey: TargetCoordinates
    - !type:HTNPrimitiveTask
      operator: !type:ShipFireGunsOperator
        shutdownState: PlanFinished
        removeKeyOnFinish: false
        leadingAccuracy: 0.6
        requireAnchored: false
        maxTargetingRange: 75
        targetKey: TargetCoordinates
