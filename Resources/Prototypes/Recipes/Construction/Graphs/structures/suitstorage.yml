# HL - Make the suit storage unit craftable
- type: constructionGraph
  id: SuitLocker
  start: start
  graph:
    - node: start
      actions:
        - !type:DeleteEntity {}
      edges:
        - to: SuitStorage
          steps:
            - material: Plasteel
              amount: 2
              doAfter: 2
            - material: MetalRod
              amount: 2
              doAfter: 2
            - material: Cable
              amount: 2
              doAfter: 2
    - node: SuitStorage
      entity: SuitStorageBase
      edges:
        - to: start
          completed:
          - !type:EmptyAllContainers
          - !type:SpawnPrototype
            prototype: SheetPlasteel1
            amount: 2
          - !type:SpawnPrototype
            prototype: PartRodMetal1
            amount: 2
          - !type:SpawnPrototype
            prototype: CableApcStack1
            amount: 2
          steps:
            - tool: Screwing
              doAfter: 2
          conditions:
          - !type:StorageWelded
            welded: false
          - !type:Locked
            locked: false
