# Medical borg
- type: borgType
  id: medical

  # Description
  dummyPrototype: BorgChassisMedical

  # Functional
  extraModuleCount: 3
  moduleWhitelist:
    tags:
    - BorgModuleGeneric
    - BorgModuleMedical
    - BorgModuleSyndicate # HardLight
    - BorgModuleSyndicateAssault # HardLight
    - XenoborgModuleGeneric # HardLight

  defaultModules:
  - BorgModuleTool # Starlight
  - BorgModuleTopicals
  - BorgModuleChemical
  - BorgModuleRescue

  radioChannels:
  - Science
  - Medical

  addComponents:
  - type: SolutionScanner
  - type: ShowHealthBars
    damageContainers:
    - Biological
    - Synth # HardLight
  - type: ShowHealthIcons
    damageContainers:
    - Biological
  # HardLight start
  - type: SurgerySpeedModifier
    speedModifier: 1.75
  - type: Sanitized
  # HardLight end

  # Visual
  inventoryTemplateId: borgDutchHL # HardLight
  spritePath: Mobs/Silicon/Chassis/medical/default.rsi
  spriteBodyMovementState: borg_moving

  # Pet
  petSuccessString: petting-success-medical-cyborg
  petFailureString: petting-failure-medical-cyborg

  # Sounds
  footstepCollection:
    collection: FootstepHoverBorg


# Service borg
- type: borgType
  id: service

  # Description
  dummyPrototype: BorgChassisService

  # Functional
  extraModuleCount: 3
  moduleWhitelist:
    tags:
    - BorgModuleGeneric
    - BorgModuleService
    - BorgModuleSyndicate # HardLight
    - BorgModuleSyndicateAssault # HardLight
    - XenoborgModuleGeneric # HardLight

  defaultModules:
  - BorgModuleTool # Starlight
  - BorgModuleMusique
  # - BorgModuleService # Frontier: deprecated, use NF variant
  - BorgModuleClowning
  - BorgModuleBureaucracy # Frontier
  - BorgModuleNFService # Frontier

  radioChannels:
