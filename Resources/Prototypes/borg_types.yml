# Medical borg
- type: borgType
  id: medical

  # Description
  dummyPrototype: BorgChassisMedical

  # Functional
  extraModuleCount: 3
  moduleWhitelist:
    tags:
    - BorgModuleGeneric
    - BorgModuleMedical
    - BorgModuleSyndicate # HardLight
    - BorgModuleSyndicateAssault # HardLight
    - XenoborgModuleGeneric # HardLight

  defaultModules:
  - BorgModuleTool
  - BorgModuleChemical
  - BorgModuleTopicals
  - BorgModuleRescue
  - BorgModuleJetpack # Frontier

  radioChannels:
  - Science
  - Medical

  addComponents:
  - type: SolutionScanner
  - type: ShowHealthBars
    damageContainers:
    - Biological
    - Synth # HardLight
  - type: ShowHealthIcons
    damageContainers:
    - Biological
  #Start HL
  - type: SurgerySpeedModifier
    speedModifier: 1.75
  - type: Sanitized
  #End HL

  # Visual
  inventoryTemplateId: borgDutchHL # HardLight: borgDutch<borgDutchHL
  spritePath: Mobs/Silicon/Chassis/medical/default.rsi
  spriteBodyMovementState: borg_moving

  # Pet
  petSuccessString: petting-success-medical-cyborg
  petFailureString: petting-failure-medical-cyborg

  # Sounds
  footstepCollection:
    collection: FootstepHoverBorg


