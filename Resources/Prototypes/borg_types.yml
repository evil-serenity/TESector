# Generic borg
- type: borgType
  id: generic

  # Description
  dummyPrototype: BorgChassisGeneric

  # Functional
  extraModuleCount: 5
  moduleWhitelist:
    tags:
    - BorgModuleGeneric
    - BorgModuleScience # Until sciborgs are added
    - BorgModuleSyndicate # HardLight
    - BorgModuleSyndicateAssault # HardLight
    - XenoborgModuleGeneric # HardLight

  defaultModules:
  - BorgModuleTool
  - BorgModuleArtifact
  - BorgModuleAnomaly
  - BorgModuleJetpack # Frontier

  radioChannels:
  - Science

  # Visual
  inventoryTemplateId: borgShortHL # HardLight
  spritePath: Mobs/Silicon/Chassis/generic/default.rsi

  # Pet
  petSuccessString: petting-success-generic-cyborg
  petFailureString: petting-failure-generic-cyborg


