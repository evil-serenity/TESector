- type: entity
  id: CrateRadioStationAds
  parent: CrateGenericSteel
  name: ads crate
  description: A whole crate which sole purpose is to store 6 exclusive ads, aint capitalism great?
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - !type:NestedSelector
          tableId: RandomCDDisk

- type: entity
  id: CrateRadioStationVinyls
  parent: CrateGenericSteel
  name: vinyls crate
  description: A crate with a random vinyl to play with the vinyl player. Collect them all!
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - !type:NestedSelector
          tableId: RandomVinylSleeve

- type: entity
  id: CrateRadioStationVinyls5
  parent: CrateGenericSteel
  name:  5 vinyls crate
  description: A crate with 5 random vinyls to play with the vinyl player. Collect them all!
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - !type:NestedSelector
          tableId: RandomVinylSleeve
          rolls: !type:ConstantNumberSelector
            value: 5


