- type: job
  id: StationRepresentative # Harbor Master
  name: job-name-sr
  description: job-description-sr
  playTimeTracker: JobHeadOfPersonnelOld
  requirements:
  - !type:OverallPlaytimeRequirement
    time: 72000 # 20 hrs
  - !type:RoleTimeRequirement
    role: JobSecurityOfficer
    time: 10800 # 3 hrs
  - !type:RoleTimeRequirement
    role: JobMercenary
    time: 72000 # 20 hrs
  - !type:RoleTimeRequirement
    role: JobQuartermaster
    time: 36000 # 10 hrs
  weight: 10
  startingGear: SrGear
  alwaysUseSpawner: true
  icon: "JobIconHarborMaster"
  setPreference: true
  supervisors: job-supervisors-centcom
  canBeAntag: false
  access:
  - Command
  - Service
  - Maintenance
  - External
  - Brig
  - Frontier
  - Mercenary
  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant ]
  - !type:GiveItemOnHolidaySpecial
    holiday: FrontierBirthday
    prototype: FrontierBirthdayGift

- type: startingGear
  id: SrGear
  equipment:
    pocket1: WeaponRevolverLucky
  storage:
    back:
    - Flash
    - RubberStampSr
# HardLight end
