    components:
    - type: ProfessionalChef # Nyano
    - type: GrantCqc # Goobstation - Martial Arts
      isBlocked: true

- type: startingGear
  id: ChefGear
  equipment:
    # shoes: ClothingShoesColorBlack # HardLight: Add NF-style departmental loadouts
    id: ChefPDA
    ears: ClothingHeadsetService
    belt: ClothingBeltChefFilled
