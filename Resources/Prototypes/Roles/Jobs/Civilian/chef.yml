  name: job-name-chef
  description: job-description-chef
  playTimeTracker: JobChef
  setPreference: true
  requirements:
    - !type:DepartmentTimeRequirement
      department: Civilian
      time: 1800 # 0.5 hr
  weight: 60 # HardLight
  startingGear: ChefGear
  icon: "JobIconChef"
  supervisors: job-supervisors-hop
  access:
  - Service
  - Maintenance
  - Kitchen
  extendedAccess:
  - Hydroponics
  - Bar
  accessGroups: # Frontier
  - GeneralAccess # Frontier
  special:
