- type: entity
  id: BorgModuleStun
  parent: [ BaseBorgModuleSecurity, BaseProviderBorgModule ]
  name: disabler cyborg module
  description: A module theoretically incapable of causing harm. If used correctly. # HardLight: Rewritten
  components:
  - type: Sprite
    sprite: Floof/Objects/Specific/Robotics/borgmodule.rsi
    layers:
    - state: security
    - state: icon-stun
  - type: ItemBorgModule # HardLight: Edited to use the new system.
    hands:
    - item: WeaponBorgDisabler
    - item: BorgStunbaton
    - item: BorgFlash
    - item: Zipties # HardLight: TODO: Make sec borgs dispense zipties and forensic pads instead.
      hand:
        emptyRepresentative: Handcuffs
        emptyLabel: borg-slot-handcuffs-empty
        whitelist:
          tags:
          - Handcuffs

